# Config estándar de pre-commit, consumida por prek (runner Rust drop-in).
#   Instalar:  uv tool install prek && prek install
#   Correr todo:  prek run --all-files
# Solo higiene rápida (format/lint/type) — SIN solver/GAMS. Los parity gates
# GTAP/PEP los enforcea un hook aparte (scripts/gtap/run_parity_gates.py).
minimum_pre_commit_version: "3.0.0"

# Datos/oráculos byte-sensibles: NUNCA reformatear (goldens, .diff, GAMS refs,
# fixtures GDX/HAR). Se excluyen de TODOS los hooks.
exclude: |
  (?x)^(
    src/equilibria/templates/reference/.*|
    .*/golden/.*|
    .*/fixtures/.*|
    .*\.(diff|gms|inc|gdx|har|prm|gdt)$
  )$

repos:
  # Higiene estándar (prek resuelve repos remotos igual que pre-commit).
  # Los que MODIFICAN archivos se acotan a la librería + tests (^(src|tests)/)
  # y a tipos de código; scripts/examples/docs son utilidades de dev, fuera del
  # candado. Los de solo-lectura corren amplio (no reescriben nada).
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        types_or: [python, pyi, yaml, toml, markdown]
        files: ^(src|tests)/
      - id: end-of-file-fixer
        types_or: [python, pyi, yaml, toml, markdown]
        files: ^(src|tests)/
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  # Local: reusa [tool.ruff] y el `ty` del dependency-group dev, vía uv run.
  # Acotados a la librería + tests (^(src|tests)/); scripts/examples/docs son
  # utilidades de dev y quedan fuera del candado.
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff (lint --fix)
        entry: uv run ruff check --fix --force-exclude
        language: system
        types_or: [python, pyi]
        files: ^(src|tests)/
        require_serial: true

      - id: ruff-format
        name: ruff (format)
        entry: uv run ruff format --force-exclude
        language: system
        types_or: [python, pyi]
        files: ^(src|tests)/
        require_serial: true

      - id: ty
        name: ty (type check — ratchet, excluye deuda de tipos congelada)
        entry: uv run ty check
        language: system
        types_or: [python, pyi]
        files: ^(src|tests)/
        require_serial: true
        # Candado: bloquea en archivos limpios; excluye los que hoy tienen
        # diagnostics (backlog de la fase F-ty). Regenerar con:
        #   uv run python scripts/dev/gen_ty_exclude.py
